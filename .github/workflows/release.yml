name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Get reference detection commit hash
        id: ref-hash
        run: echo "sha=$(git ls-remote https://github.com/AprilRobotics/apriltag.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - name: Cache reference detection
        id: cache-ref
        uses: actions/cache@v4
        with:
          path: docs/reference-detection
          key: reference-detection-${{ steps.ref-hash.outputs.sha }}
      - name: Fetch reference detection
        if: steps.cache-ref.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/AprilRobotics/apriltag.git docs/reference-detection
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-features -- -D warnings
      - run: cargo test --workspace --all-features
      - run: cargo build --target wasm32-unknown-unknown -p apriltag -p apriltag-gen

  release:
    name: GitHub Release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" --draft --generate-notes --title "${{ github.ref_name }}"
